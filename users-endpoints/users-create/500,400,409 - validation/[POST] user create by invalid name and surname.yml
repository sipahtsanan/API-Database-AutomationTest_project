info:
  name: "[POST] user create by invalid name and surname"
  type: http
  seq: 6

http:
  method: POST
  url: "{{user_endpoint}}/api/users"
  body:
    type: json
    data: |-
      {
          "cid": "{{gen_cid}}",
          "name": "runScript_name_invalid_testtttttttttttttttttttttttt",
          "surname": "runScript_surname_invalid_testttttttttttttttttttttt"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.body.message
      operator: eq
      value: name must not exceed 50 characters
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
