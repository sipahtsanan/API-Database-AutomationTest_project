info:
  name: "[GET] search user by cid must not exceed 13 digits"
  type: http
  seq: 3

http:
  method: POST
  url: "{{user_endpoint}}/api/users/search"
  body:
    type: json
    data: '{ "cid": "123456789012333" }'
  auth: inherit

runtime:
  assertions:
    - expression: res.body.message
      operator: eq
      value: cid must be exactly 13 digits
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
