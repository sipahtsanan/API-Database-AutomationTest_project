info:
  name: "[DELETE] user by cid not found"
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{user_endpoint}}/api/users"
  body:
    type: json
    data: |-
      {
        "cid": "{{cid_not_found}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const reqBody = req.getBody();
        const cidBody = reqBody.cid;
        const resBody = res.getBody();

        test("message should contain cid", function() {
          expect(resBody.message).to.equal(`User with cid '${cidBody}' not found`);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
