info:
  name: "[POST] update user by invalid status"
  type: http
  seq: 3

http:
  method: POST
  url: "{{user_endpoint}}/api/users/update"
  body:
    type: json
    data: |-
      {
          "cid": "{{cid_update_invalid}}",
          "status": null
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.message
      operator: eq
      value: status must be 'active' or 'inactive'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
