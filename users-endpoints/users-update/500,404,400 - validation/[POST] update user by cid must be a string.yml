info:
  name: "[POST] update user by cid must be a string"
  type: http
  seq: 4

http:
  method: POST
  url: "{{user_endpoint}}/api/users/update"
  body:
    type: json
    data: |-
      {
          "cid": {{cid_update_invalid}},
          "status": "{{status_update}}"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.message
      operator: eq
      value: cid must be a string

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
